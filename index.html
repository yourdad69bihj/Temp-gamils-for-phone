<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Temp Gmails</title>
    <style>
        :root { --neon: #00f2ea; --bg: #0b0c10; --panel: #1f2833; --purple: #7a00ff; }
        
        /* Forces the app to fill the entire phone screen */
        html, body { 
            height: 100%; width: 100%; margin: 0; padding: 0; 
            background: var(--bg); overflow: hidden; 
        }

        body { 
            color: white; font-family: 'Segoe UI', sans-serif; 
            display: flex; flex-direction: column; 
        }

        .menu {
            display: flex; flex-direction: column;
            height: 100vh; width: 100vw;
            background: var(--panel);
            border: none; /* Removed border to fill screen edge-to-edge */
        }

        .header { 
            background: rgba(0, 242, 234, 0.1); padding: 20px; text-align: center; 
            border-bottom: 1px solid var(--neon); font-weight: bold; 
            text-shadow: 0 0 10px var(--neon); text-transform: uppercase;
            font-size: 18px;
        }

        .content { 
            padding: 20px; flex-grow: 1; display: flex; flex-direction: column; 
            overflow-y: auto; 
        }

        .addr-box { 
            background: #000; border: 1px solid #333; padding: 20px; 
            border-radius: 12px; text-align: center; margin-bottom: 20px; 
        }

        .email-text { 
            color: var(--neon); font-family: monospace; font-size: 18px; 
            margin-bottom: 15px; word-break: break-all; 
        }

        .btn { 
            background: #111; border: 1px solid #444; color: white; padding: 15px; 
            width: 100%; border-radius: 8px; cursor: pointer; margin-bottom: 10px; 
            font-size: 14px; font-weight: bold; text-transform: uppercase; 
        }

        .btn:active { background: var(--neon); color: black; }
        .btn-cyan { border-color: var(--neon); color: var(--neon); }
        .btn-purple { border-color: var(--purple); color: var(--purple); }

        .label { 
            font-size: 11px; color: #555; text-transform: uppercase; 
            margin: 10px 0 10px; display: block; letter-spacing: 1px;
        }

        .list { flex-grow: 1; overflow-y: auto; border-top: 1px solid #222; }

        .item { 
            background: rgba(255,255,255,0.03); padding: 15px; margin-top: 10px; 
            border-radius: 8px; display: flex; justify-content: space-between; 
            align-items: center; border-left: 4px solid var(--neon); 
        }

        .item-text { flex-grow: 1; cursor: pointer; font-size: 14px; color: var(--neon); }
        
        .code-pill { 
            background: var(--neon); color: black; font-weight: 900; padding: 10px; 
            border-radius: 4px; margin: 15px 0; display: inline-block; 
            box-shadow: 0 0 15px var(--neon); 
        }

        .msg-body { 
            font-size: 13px; color: #ccc; margin-top: 10px; padding-top: 15px; 
            border-top: 1px dashed #444; white-space: pre-wrap; 
        }

        .hidden { display: none !important; }

        /* Full-screen Reader */
        #view-inbox { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: var(--bg); z-index: 100; padding: 20px; box-sizing: border-box; 
        }
    </style>
</head>
<body>

<div class="menu" id="view-home">
    <div class="header">VULCAN FRESH MOBILE</div>
    <div class="content">
        <div class="addr-box">
            <div id="active-addr" class="email-text">None Generated</div>
            <button class="btn btn-cyan" onclick="generateNew()">Generate New</button>
            <button class="btn btn-purple" onclick="saveSession()">Save Session</button>
        </div>
        <span class="label">Saved History</span>
        <div id="history-list" class="list"></div>
    </div>
</div>

<div id="view-inbox" class="hidden">
    <button class="btn" onclick="closeInbox()">← Back to History</button>
    <div class="addr-box"><div id="inbox-title" class="email-text" style="font-size:14px"></div></div>
    <button class="btn btn-cyan" onclick="refreshInbox()">Refresh Inbox</button>
    <div id="msg-list" class="list" style="height: calc(100% - 200px);"></div>
</div>

<script>
    const API = "https://api.mail.tm";
    let sessions = JSON.parse(localStorage.getItem('v_sessions') || "[]");
    let currentMail = "";
    let currentToken = "";

    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

    async function generateNew() {
        const dRes = await fetch(`${API}/domains`);
        const dData = await dRes.json();
        const domain = dData["hydra:member"][0].domain;
        const address = `vlc_${Math.random().toString(36).substring(7)}@${domain}`;
        const password = "password67";
        
        const acc = await fetch(`${API}/accounts`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ address, password })
        });
        if (acc.ok) {
            const tRes = await fetch(`${API}/token`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ address, password })
            });
            const tData = await tRes.json();
            currentMail = address;
            currentToken = tData.token;
            document.getElementById('active-addr').innerText = address;
        }
    }

    function saveSession() {
        if (!currentMail) return;
        if (!sessions.find(s => s.addr === currentMail)) {
            sessions.unshift({ addr: currentMail, token: currentToken });
            localStorage.setItem('v_sessions', JSON.stringify(sessions));
            renderHistory();
        }
    }

    function renderHistory() {
        const list = document.getElementById('history-list');
        list.innerHTML = sessions.length ? "" : "<div style='text-align:center;padding:20px;color:#444'>No History</div>";
        sessions.forEach((s, i) => {
            const div = document.createElement('div');
            div.className = "item";
            div.innerHTML = `<div class="item-text" onclick="openInbox('${s.addr}', '${s.token}')">${s.addr}</div>
                             <button class="btn" style="width:auto;margin:0;border-color:#a52a2a;color:#ff4444" onclick="deleteSession(${i})">X</button>`;
            list.appendChild(div);
        });
    }

    function deleteSession(i) {
        sessions.splice(i, 1);
        localStorage.setItem('v_sessions', JSON.stringify(sessions));
        renderHistory();
    }

    async function openInbox(addr, token) {
        currentMail = addr; currentToken = token;
        document.getElementById('view-home').classList.add('hidden');
        document.getElementById('view-inbox').classList.remove('hidden');
        document.getElementById('inbox-title').innerText = addr;
        refreshInbox();
    }

    function closeInbox() {
        document.getElementById('view-inbox').classList.add('hidden');
        document.getElementById('view-home').classList.remove('hidden');
    }

    async function refreshInbox() {
        const list = document.getElementById('msg-list');
        list.innerHTML = "<div style='text-align:center;padding:20px;color:cyan'>Scanning...</div>";
        const res = await fetch(`${API}/messages`, { headers: { 'Authorization': `Bearer ${currentToken}` } });
        const data = await res.json();
        const msgs = data["hydra:member"];
        list.innerHTML = msgs.length ? "" : "<div style='text-align:center;padding:20px;color:#444'>Inbox Empty</div>";
        msgs.forEach(m => {
            const div = document.createElement('div');
            div.className = "item";
            div.style.flexDirection = "column";
            div.style.alignItems = "flex-start";
            div.innerHTML = `<div onclick="toggleMsg('${m.id}')"><b>${m.from.address}</b><br><small>${m.subject}</small></div>
                             <div id="body-${m.id}" class="hidden msg-body"></div>`;
            list.appendChild(div);
        });
    }

    async function toggleMsg(id) {
        const bodyWrap = document.getElementById(`body-${id}`);
        if (!bodyWrap.classList.contains('hidden')) return bodyWrap.classList.add('hidden');
        bodyWrap.classList.remove('hidden');
        const res = await fetch(`${API}/messages/${id}`, { headers: { 'Authorization': `Bearer ${currentToken}` } });
        const data = await res.json();
        const text = data.text || data.intro;
        const code = text.match(/\b\d{4,6}\b/);
        let codeBtn = code ? `<div class="code-pill" onclick="navigator.clipboard.writeText('${code[0]}');alert('Copied!')">COPY CODE: ${code[0]}</div>` : "";
        bodyWrap.innerHTML = codeBtn + "<div>" + text + "</div>";
    }

    renderHistory();
</script>
</body>
</html>
